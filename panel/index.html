<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timate Admin</title>
    <!-- ЗАЩИТНЫЙ СКРИПТ: ПРОВЕРЯЕМ КЛЮЧ ПЕРЕД ЗАГРУЗКОЙ -->
    <script>
        (function() {
            const STORAGE_KEY = 'timate_auth_session';
            // Если в памяти браузера нет отметки о входе, отправляем на главную
            if (localStorage.getItem(STORAGE_KEY) !== 'true') {
                window.location.href = 'https://admin.timate.ru'; 
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-main: #0a0a0a;
            --bg-sidebar: #0f0f0f;
            --accent-blue: #007bff;
            --border-color: #1a1a1a;
            --text-muted: #888888;
        }

        body {
            background-color: var(--bg-main);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .sidebar {
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            width: 280px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nav-list {
            flex: 1;
            overflow-y: auto;
            padding-top: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            color: #efefef;
            text-decoration: none;
            font-size: 15px;
            transition: all 0.2s ease;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-item:hover {
            background-color: #161616;
            color: var(--accent-blue);
        }

        .nav-item i {
            width: 20px;
            margin-right: 12px;
            color: #555;
            font-size: 16px;
        }

        .nav-item:hover i {
            color: var(--accent-blue);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-main);
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* Кастомный скроллбар */
        .nav-list::-webkit-scrollbar {
            width: 4px;
        }
        .nav-list::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 10px;
        }

        .logout-btn {
            cursor: pointer;
            color: #ff4444 !important;
        }
        .logout-btn:hover {
            background-color: rgba(255, 68, 68, 0.1) !important;
        }
    </style>
</head>
<body class="flex">

    <!-- Боковая панель -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title">Timate Admin</h2>
        </div>

        <nav class="nav-list">
            <!-- Назад -->
            <a href="https://admin.timate.ru" class="nav-item">
                <i class="fa-solid fa-folder"></i>
                <span>..</span>
            </a>

            <!-- Пункты меню -->
            <a href="https://admin.timate.ru/banlist" class="nav-item">
                <i class="fa-solid fa-folder"></i>
                <span>Banlist</span>
            </a>

            <a href="https://admin.timate.ru/deloper" class="nav-item">
                <i class="fa-solid fa-folder"></i>
                <span>deloper</span>
            </a>

            <a href="https://admin.timate.ru/download" class="nav-item">
                <i class="fa-solid fa-folder"></i>
                <span>download</span>
            </a>

            <a href="https://admin.timate.ru/logs" class="nav-item">
                <i class="fa-solid fa-folder"></i>
                <span>logs</span>
            </a>

            <a href="https://admin.timate.ru/settings" class="nav-item">
                <i class="fa-solid fa-folder"></i>
                <span>settings</span>
            </a>

            <a href="https://admin.timate.ru/trolpanel" class="nav-item">
                <i class="fa-solid fa-folder"></i>
                <span>trolpanel</span>
            </a>

            <a href="https://admin.timate.ru/users" class="nav-item">
                <i class="fa-solid fa-folder"></i>
                <span>users</span>
            </a>

            <a href="https://admin.timate.ru/web-control" class="nav-item">
                <i class="fa-solid fa-folder"></i>
                <span>web-control</span>
            </a>

            <!-- Кнопка Выйти -->
            <div onclick="logout()" class="nav-item logout-btn">
                <i class="fa-solid fa-right-from-bracket" style="color: #ff4444;"></i>
                <span>Выйти из сессии</span>
            </div>
        </nav>

        <div class="p-6 border-t border-[#1a1a1a] text-[11px] text-[#444] uppercase tracking-widest">
            Timate Admin Panel
        </div>
    </aside>

    <!-- Основная рабочая область -->
    <main class="main-content">
        <div class="text-center">
            <div class="logo-text uppercase">Timate</div>
            <div class="text-2xl font-bold mb-2">Admin Dashboard</div>
            <p class="subtitle">Выберите раздел для продолжения работы</p>
        </div>
    </main>

    <script>
        // Функция для выхода (сброса ключа)
        function logout() {
            localStorage.removeItem('timate_auth_session');
            window.location.href = 'https://admin.timate.ru';
        }
    </script>

</body>
</html>
